<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Context IDE</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand"><span class="mark">C</span><span>Context IDE</span></div>
    <div id="tabs" class="tabs"></div>
    <button id="new-tab" class="icon-button" title="New task">+</button>
    <div class="status"><span class="status-dot"></span><span>Local workspace</span></div>
  </header>
  <main>
    <aside class="left-panel">
      <div class="panel-heading"><span>Agents</span><button id="new-agent" class="tiny-button">+</button></div>
      <div id="agent-list" class="agent-list"></div>
      <div class="panel-heading context-heading"><span>Universal context</span><span id="context-count" class="muted"></span></div>
      <textarea id="universal-context" placeholder="Facts, goals, conventions, decisions… Every agent can read this."></textarea>
      <div class="save-state" id="save-state">Saved locally</div>
    </aside>

    <section class="workspace">
      <div class="task-header">
        <div>
          <input id="task-title" class="task-title" aria-label="Task title" />
          <div class="task-meta"><span id="active-agent-label"></span><span>•</span><span id="message-count"></span></div>
        </div>
        <div class="task-actions">
          <button id="attach-button" class="secondary-button">⌘ Attach tabs</button>
          <button id="clear-button" class="secondary-button danger">Clear</button>
        </div>
      </div>
      <div id="attachments" class="attachments"></div>
      <div id="messages" class="messages"></div>
      <form id="composer" class="composer">
        <textarea id="prompt" rows="1" placeholder="Ask the active agent… (⌘/Ctrl + Enter to send)"></textarea>
        <button id="send" type="submit">Send <span>↵</span></button>
      </form>
    </section>

    <aside class="right-panel">
      <div class="panel-heading">Task context graph</div>
      <div id="graph" class="graph"></div>
      <div class="context-preview">
        <div class="panel-heading">Context reaching this agent</div>
        <div id="context-preview" class="preview-copy"></div>
      </div>
    </aside>
  </main>

  <dialog id="attach-dialog">
    <form method="dialog">
      <div class="dialog-header"><h2>Attach task tabs</h2><button value="cancel" class="icon-button">×</button></div>
      <p>Attached tabs contribute their title and latest conversation to this task’s context.</p>
      <div id="attach-options" class="attach-options"></div>
      <div class="dialog-actions"><button value="cancel" class="secondary-button">Done</button></div>
    </form>
  </dialog>

  <dialog id="agent-dialog">
    <form id="agent-form">
      <div class="dialog-header"><h2>Create agent</h2><button type="button" data-close class="icon-button">×</button></div>
      <label>Name<input name="name" required placeholder="Researcher" /></label>
      <label>Model<input name="model" required value="gpt-5-mini" /></label>
      <label>Instructions<textarea name="instructions" required rows="4" placeholder="Investigate claims and cite evidence."></textarea></label>
      <div class="dialog-actions"><button type="button" data-close class="secondary-button">Cancel</button><button type="submit">Create agent</button></div>
    </form>
  </dialog>
  <script src="/app.js"></script>
</body>
</html>
